# Remember ------------------------------------------------------
# prefix + f    | search windows
# prefix + .    | change window number (!!!)
# prefix + r    | will rename the session (why would you rename the window, bruh)
# prefix + z    | zoom it a pannel (press again to unzoom it)
# prefix + !    | transform panel in a window (index will be the new current last)
# tmux kill-session -a  | remove all other sessions (not the current)

# Settings ------------------------------------------------------
set -s escape-time 50
unbind C-b                      # super
set-option -g prefix M-s        # super
set-option -g focus-events on   # focus ability
set-option -g set-clipboard on

# setup for wayland ---------------------------------------------
set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_SESSION_TYPE XDG_RUNTIME_DIR"

# make mouse selection work properly ----------------------------
set -g mouse on
unbind  -T copy-mode-vi MouseDragEnd1Pane   # this and below solves the selected area disappearing
bind    -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
set -g extended-keys on

# make image preview work ---------------------------------------
#set -g allow-passthrough on
#set -ga update-environment TERM
#set -ga update-environment TERM_PROGRAM

# Bar -----------------------------------------------------------
set-option -g status-bg colour111
#set-option -g status-justify left
    #set-option -g status-left-length 30
set-option -g status-left "#[bold] #S ♜ #[default]"
    #set-option -g status-left "#[bold] #S 🦫 #[default]"
    #set-option -g status-right-length 100
set-option -g status-right "@#H:#{=10:pane_current_path} 󰏖 #(hostname -i | cut -d' ' -f1) #[default]󰏖 #[bold]%H:%M #[default]"
set-option -g pane-active-border-style 'fg=colour75'
set-option -g window-status-current-format "#[bg=black,fg=colour111] #I:#W #[default]"


# Keys ----------------------------------------------------------
## [-] Pannels ------------------------------
### Pannel Create
bind-key l split-window -h
bind-key j split-window -v
bind-key w kill-pane

### Pannel Moves
setw -g mode-keys vi
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R
bind-key -T copy-mode-vi -n C-h select-pane -L  # Move while in vi-mode
bind-key -T copy-mode-vi -n C-j select-pane -D  # Move while in vi-mode 
bind-key -T copy-mode-vi -n C-k select-pane -U  # Move while in vi-mode
bind-key -T copy-mode-vi -n C-l select-pane -R  # Move while in vi-mode

### Pannel Resize
bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-h resize-pane -L 5
bind-key -r -T prefix M-l resize-pane -R 5


## [-] Windows ------------------------------
### Window Create
bind-key -n C-n new-window
#bind-key w kill-window

### Switch to windows 0 through 9
# it was suppose to work out by default... 
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9


## [-] Modes --------------------------------
### Copy Mode
bind-key v copy-mode
bind-key p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi I send-keys -X start-of-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel


## [-] Sessions -----------------------------
bind-key r command-prompt -p "Rename session: " "rename-session '%%'"
bind-key -T prefix f choose-tree -Zs

